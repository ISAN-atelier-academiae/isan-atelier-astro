  <title
     id="title1">S‑1 Sección triangular: ideal vs obra</title>
  <desc
     id="desc1">Triángulo ideal (229.43 × 146.06) y obra (230.363 × 146.60). t_mo ≤ 2%, ∠ ≤ 0.50°.</desc>
  <defs
     id="defs1">
    <marker
       id="arrow"
       markerWidth="6"
       markerHeight="6"
       refX="5"
       refY="3"
       orient="auto">
      <path
         d="M 0,0 6,3 0,6 Z"
         fill="#555555"
         id="path1" />
    </marker>
    <style
       id="style1">
      .axis{stroke:#888;stroke-width:1;marker-end:url(#arrow)}
      .ideal{stroke:#1b7;stroke-width:3;fill:none}
      .obra{stroke:#d33;stroke-width:3;fill:none;stroke-dasharray:10 6}
      .dim{stroke:#555;stroke-width:1}
      .label{font:16px sans-serif;fill:#222}
      .note{font:14px sans-serif;fill:#555}
    </style>
  </defs>
  <line
     x1="100"
     y1="800"
     x2="1500"
     y2="800"
     class="axis"
     id="line1" />
  <line
     x1="100"
     y1="800"
     x2="100"
     y2="100"
     class="axis"
     id="line2" />
  <!-- escala: 1 m ≈ 3 px; Ideal: base 229.43→688 px; altura 146.06→438 px -->
  <polygon
     points="788,800 444,362 100,800 "
     class="ideal"
     id="polygon2" />
  <text
     x="440"
     y="350"
     class="label"
     id="text2"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:sans-serif">Ideal 229.43 × 146.06</text>
  <!-- Obra: base 230.363→691 px; altura 146.60→440 px -->
  <polygon
     points="791,800 446,360 100,800 "
     class="obra"
     id="polygon3" />
  <text
     x="448"
     y="340"
     class="label"
     id="text3"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:sans-serif">Obra 230.363 × 146.60</text>
  <line
     x1="100"
     y1="820"
     x2="788"
     y2="820"
     class="dim"
     id="line3" />
  <text
     x="420"
     y="845"
     class="label"
     id="text4"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:sans-serif">Base ideal 229.43 m</text>
  <line
     x1="791"
     y1="800"
     x2="791"
     y2="360"
     class="dim"
     id="line4" />
  <text
     x="-585"
     y="805"
     class="label"
     transform="rotate(-90)"
     id="text5"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:sans-serif">Altura obra 146.60 m</text>
  <text
     x="950"
     y="140"
     class="label"
     id="text6"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:sans-serif">P/(2H) ideal ≈ 3.14159</text>
  <text
     x="950"
     y="170"
     class="label"
     id="text7"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:16px;line-height:normal;font-family:sans-serif">P/(2H) obra ≈ 3.14274</text>
  <text
     x="950"
     y="210"
     class="note"
     id="text8"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:sans-serif">t_mo ≤ 2% • ∠ ≤ 0.50°</text>
